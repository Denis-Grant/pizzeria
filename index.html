<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Menu</title>

<link href="https://fonts.googleapis.com/css2?family=PT+Sans+Narrow:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  font-family: 'PT Sans Narrow', sans-serif;
  margin:0;
  background:#121618;
  color:#fff;
}

.container { padding:16px; padding-bottom:90px; }

h2 {
  margin-top:24px;
  background:#ffc850 !important;
  color:#000;
  padding:8px 12px;
  border-radius:8px;
  font-weight:700;
}

.item {
  background:#1D2326;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info { max-width:70%; }
.name { font-weight:700; }
.price { color:#ccc; }

.controls { display:flex; align-items:center; gap:8px; }

button {
  border:none;
  border-radius:50%;
  width:36px;
  height:36px;
  font-size:18px;
  cursor:pointer;
}

.add { background:#ffc850; color:#000; }
.remove { background:#333; color:#fff; }

.qty { font-weight:bold; min-width:20px; text-align:center; }

.footer {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#ffc850;
  color:#000;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
}

#total { font-size:20px; }

.footer button {
  background:#000;
  color:#ffc850;
  border-radius:50%;
  width:40px;
  height:40px;
}

input {
  width:100%;
  padding:8px 12px;
  margin-bottom:12px;
  border-radius:8px;
  border:none;
  font-family: 'PT Sans Narrow', sans-serif;
  font-size:18px;
  height:36px;
}

#summary-name {
  font-size:22px;
  font-weight:700;
  text-transform:uppercase;
  text-decoration:underline;
  margin-bottom:10px;
}

.summary-item {
  font-size:22px;
  font-weight:700;
  margin-bottom:6px;
}

.confirm-buttons {
  display:flex;
  gap:10px;
  margin-top:30px;
}

.back-btn {
  flex:1;
  padding:12px;
  border-radius:8px;
  background:#1D2326;
  color:#fff;
  border:1px solid #ffc850;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container" id="menuScreen">
  <h2>Your Name</h2>
  <input type="text" id="customerName" placeholder="Enter your name (or family name)" />
  <div id="menu"></div>
</div>

<div class="container hidden" id="confirmScreen">
  <h2>Confirm Order</h2>
  <div id="summary"></div>

  <div class="confirm-buttons">
    <button class="back-btn" onclick="goBack()">Back</button>
  </div>
</div>

<div class="footer">
  <div id="count">0 items</div>
  <div id="total">£0.00</div>
  <button onclick="goConfirm()">➜</button>
</div>

<script>
const webhookURL = "https://vmi2930391.contaboserver.net/webhook/968330cd-d7a1-45c6-a799-1cd1531fcf78";

const data = window.data || {};

let cart = {};

function renderMenu() {
  const menuDiv = document.getElementById("menu");
  menuDiv.innerHTML = "";

  for (let category in data) {
    const h = document.createElement("h2");
    h.textContent = category;
    menuDiv.appendChild(h);

    data[category].forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      const info = document.createElement("div");
      info.className = "info";
      info.innerHTML = `<div class='name'>${item.name}</div><div class='price'>£${item.price.toFixed(2)}</div>`;

      const controls = document.createElement("div");
      controls.className = "controls";

      const minus = document.createElement("button");
      minus.textContent = "-";
      minus.className = "remove";
      minus.onclick = () => updateQty(item.name, -1);

      const qty = document.createElement("span");
      qty.className = "qty";
      qty.textContent = cart[item.name] || 0;

      const plus = document.createElement("button");
      plus.textContent = "+";
      plus.className = "add";
      plus.onclick = () => updateQty(item.name, 1);

      controls.append(minus, qty, plus);
      div.append(info, controls);
      menuDiv.appendChild(div);
    });
  }
}

function updateQty(name, change) {
  cart[name] = (cart[name] || 0) + change;
  if (cart[name] <= 0) delete cart[name];
  renderMenu();
  updateFooter();
}

function updateFooter() {
  let count = 0;
  let total = 0;

  for (let name in cart) {
    const item = findItem(name);
    count += cart[name];
    total += cart[name] * item.price;
  }

  document.getElementById("count").textContent = `${count} items`;
  document.getElementById("total").textContent = `£${total.toFixed(2)}`;
}

function findItem(name) {
  for (let cat in data) {
    const item = data[cat].find(i => i.name === name);
    if (item) return item;
  }
}

function goConfirm() {
  document.getElementById("menuScreen").classList.add("hidden");
  document.getElementById("confirmScreen").classList.remove("hidden");

  const summary = document.getElementById("summary");
  summary.innerHTML = "";

  const customerName = document.getElementById("customerName").value;
  const nameDiv = document.createElement("div");
  nameDiv.id = "summary-name";
  nameDiv.textContent = customerName || "(No name entered)";
  summary.appendChild(nameDiv);

  for (let name in cart) {
    const item = findItem(name);
    const div = document.createElement("div");
    div.className = "summary-item";

    const category = Object.keys(data).find(cat => data[cat].some(i => i.name === name));
    const isExtra = category === "EXTRA TOPPINGS";

    div.textContent = `${name} x${cart[name]} - £${(item.price * cart[name]).toFixed(2)}${isExtra ? " (Extra toppings)" : ""}`;
    summary.appendChild(div);
  }

  const drinksNote = document.createElement("div");
  drinksNote.style.marginTop = "20px";
  drinksNote.style.color = "#ff5c5c";
  drinksNote.style.fontWeight = "700";
  drinksNote.textContent = "Drinks not Included";
  summary.appendChild(drinksNote);
}

function goBack() {
  document.getElementById("menuScreen").classList.remove("hidden");
  document.getElementById("confirmScreen").classList.add("hidden");
}

renderMenu();
updateFooter();
</script>

</body>
</html>
