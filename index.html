<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pizzeria Menu</title>

<link href="https://fonts.googleapis.com/css2?family=PT+Sans+Narrow:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

body {
  font-family: 'PT Sans Narrow', sans-serif;
  margin:0;
  background:#121618;
  color:#fff;
}

.container { 
  padding:16px; 
  padding-bottom:90px; /* prevents footer overlap */
}

h2 {
  margin-top:24px;
  background:#ffc850 !important;
  color:#000;
  padding:8px 12px;
  border-radius:8px;
  font-weight:700;
}

.item {
  background:#1D2326;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info { max-width:70%; }

.name { font-weight:700; }

.price { color:#ccc; }

.controls { display:flex; align-items:center; gap:8px; }

button {
  border:none;
  border-radius:50%;
  width:36px;
  height:36px;
  font-size:18px;
  cursor:pointer;
}

.add {
  background:#ffc850;
  color:#000;
}

.remove {
  background:#333;
  color:#fff;
}

.qty {
  font-weight:bold;
  min-width:20px;
  text-align:center;
}

.footer {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#ffc850;
  color:#000;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:700;
}

#total {
  font-size: 20px;
}

#summary {
  margin-top: 10px;
}

#summary-name {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 10px;
}

.summary-item {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}

.footer button {
  background:#000;
  color:#ffc850;
  border-radius:50%;
  width:40px;
  height:40px;
  font-size:20px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:12px 12px;
  margin-bottom:12px;
  /* border-radius:8px; */
  border:none;
  font-family: 'PT Sans Narrow', sans-serif;
  font-size:18px;
  height:36px;
}

.confirm-buttons {
  display:flex;
  gap:10px;
  margin-top:16px;
}

.confirm-buttons button {
  flex:1;
  padding:12px;
  border-radius:8px;
  font-weight:700;
  font-size:16px;
}

.submit-btn {
  background:#ffc850;
  color:#000;
}

.back-btn {
  background:#1D2326;
  color:#fff;
  border:1px solid #ffc850;
}
.confirm-buttons {
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container" id="menuScreen">
  <h2>Your Name</h2>
  <input type="text" id="customerName" placeholder="Enter your name (or family name)" />
  <div id="menu"></div>
</div>

<div class="container hidden" id="confirmScreen">
  <h2>Confirm Order</h2>
  <div id="summary"></div>
  <div style="margin-top:20px; color:#e85d5d; font-size:18px;">DRINKS NOT INCLUDED</div>
  <div class="confirm-buttons">
    <button class="back-btn" onclick="goBack()">Back</button>
    <!-- <button class="submit-btn" onclick="submitOrder()">Submit</button> -->
  </div>
</div>

<div class="footer">
  <div id="count">0 items</div>
  <div id="total">£0.00</div>
  <button onclick="goConfirm()">➜</button>
</div>

<script>
const webhookURL = "https://vmi2930391.contaboserver.net/webhook/968330cd-d7a1-45c6-a799-1cd1531fcf78";

const data = {
"ANTIPASTI": [
{ "name": "Soup of the Day", "price": 5.9 },
{ "name": "Marinated Olives", "price": 3.9 },
{ "name": "Tomato Bread", "price": 4.5 },
{ "name": "Garlic Bread / Optional Cheese", "price": 4.5 },
{ "name": "Bruschetta with Burrata and N'Duja", "price": 7.9 },

{ "name": "Insalata Tricolore", "price": 8.9 },
{ "name": "Melenzane Parmigiana", "price": 8.9 },
{ "name": "Avocado Prawns", "price": 9.2 },
{ "name": "Burrata Salad", "price": 9.9 },
{ "name": "Charcuterie Board", "price": 11.9 },
{ "name": "Prawns in Garlic", "price": 9.9 },
{ "name": "Deep Fried Calamari", "price": 9.6 },
{ "name": "Mussels", "price": 9.9 },
{ "name": "Nicoise Salad", "price": 11.9 }
],
"MIXED SALAD": [
{ "name": "Mixed Salad", "price": 6.5 },
{ "name": "Tomato Salad with Red Onions", "price": 6.5 },
{ "name": "Rocket Salad", "price": 6.5 }
],
"EXTRA TOPPINGS": [
{ "name": "Vegetables", "price": 1.6 },
{ "name": "Meat", "price": 2.4 },
{ "name": "Cheeses", "price": 2.4 },
{ "name": "Fish", "price": 2.4 }
],
"PIZZA": [
{ "name": "Margherita", "price": 10.9 },
{ "name": "Napoletana", "price": 12.8 },
{ "name": "Pugliese", "price": 13.9 },
{ "name": "Quattro Stagione", "price": 14.2 },
{ "name": "Vesuvio", "price": 13.5 },
{ "name": "Capricciosa", "price": 14.2 },
{ "name": "Parmigiana", "price": 12.9 },
{ "name": "American Hot", "price": 14.2 },
{ "name": "Siciliana", "price": 13.9 },
{ "name": "La Reine", "price": 12.9 },
{ "name": "Quattro Formaggi", "price": 14.2 },
{ "name": "Pizza Mediterraneo", "price": 13.9 },
{ "name": "Vegeteriana", "price": 13.7 },
{ "name": "Chicken Pizza", "price": 13.9 },
{ "name": "Pizza Cecco", "price": 13.4 },
{ "name": "Pizza Burrata", "price": 14.2 },
{ "name": "Pizza Chef", "price": 14.9 },
{ "name": "Pizza Tutto Mare", "price": 14.9 },
{ "name": "Calzone Spinach", "price": 13.5 },
{ "name": "Pizza Nduja", "price": 13.9 }
],
"PASTA": [
{ "name": "Spaghetti Bolognese", "price": 12.9 },
{ "name": "Penne Carbonara", "price": 12.9 },
{ "name": "Lasagna al Forno", "price": 13.9 },
{ "name": "Spaghetti Marinara", "price": 15.9 },
{ "name": "Spaghetti Gamberoni", "price": 15.9 },
{ "name": "Penne All'Amatriciana", "price": 12.9 },
{ "name": "Rigatoni alla Bosciaola", "price": 13.9 },
{ "name": "Spaghetti alla Vongole", "price": 12.9 },
{ "name": "Rigatoni Aurora", "price": 13.9 },
{ "name": "Spaghetti Pesto", "price": 11.9 },
{ "name": "Grilled Fillet of Seabass", "price": 21.5 },
{ "name": "Grilled Sirloin Steak", "price": 21.9 },
{ "name": "Chicken Milanese", "price": 18.5 }
]
};

let cart = {};

function renderMenu() {
  const menuDiv = document.getElementById("menu");
  menuDiv.innerHTML = "";

  for (let category in data) {
    const h = document.createElement("h2");
    h.textContent = category;
    menuDiv.appendChild(h);

    data[category].forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      const info = document.createElement("div");
      info.className = "info";
      info.innerHTML = `<div class='name'>${item.name}</div><div class='price'>£${item.price.toFixed(2)}</div>`;

      const controls = document.createElement("div");
      controls.className = "controls";

      const minus = document.createElement("button");
      minus.textContent = "-";
      minus.className = "remove";
      minus.onclick = () => updateQty(item.name, -1);

      const qty = document.createElement("span");
      qty.className = "qty";
      qty.textContent = cart[item.name] || 0;

      const plus = document.createElement("button");
      plus.textContent = "+";
      plus.className = "add";
      plus.onclick = () => updateQty(item.name, 1);

      controls.append(minus, qty, plus);
      div.append(info, controls);
      menuDiv.appendChild(div);
    });
  }
}

function updateQty(name, change) {
  cart[name] = (cart[name] || 0) + change;
  if (cart[name] <= 0) delete cart[name];
  renderMenu();
  updateFooter();
}

function updateFooter() {
  let count = 0;
  let total = 0;

  for (let name in cart) {
    const item = findItem(name);
    count += cart[name];
    total += cart[name] * item.price;
  }

  document.getElementById("count").textContent = `${count} items`;
  document.getElementById("total").textContent = `£${total.toFixed(2)}`;
}

function findItem(name) {
  for (let cat in data) {
    const item = data[cat].find(i => i.name === name);
    if (item) return item;
  }
}

function goConfirm() {
  document.getElementById("menuScreen").classList.add("hidden");
  document.getElementById("confirmScreen").classList.remove("hidden");

  const summary = document.getElementById("summary");
  summary.innerHTML = "";

  const customerName = document.getElementById("customerName").value;
  const nameDiv = document.createElement("div");
  nameDiv.id = "summary-name";
  nameDiv.textContent = `Customer: ${customerName ? customerName : "(No name entered)"}.`;
  nameDiv.style.textTransform = "capitalize";
  // nameDiv.style.textDecoration = "underline";
  nameDiv.style.fontWeight = "normal"
  summary.appendChild(nameDiv);

  for (let name in cart) {
    const item = findItem(name);
    const div = document.createElement("div");
    div.className = "summary-item";
    const category = Object.keys(data).find(cat => data[cat].some(i => i.name === name));
    const isExtra = category === "EXTRA TOPPINGS";
    div.textContent = `${name} x${cart[name]} - £${(item.price * cart[name]).toFixed(2)}${isExtra ? " (Extra toppings)" : ""}`;
    summary.appendChild(div);
  }
}

function goBack() {
  document.getElementById("menuScreen").classList.remove("hidden");
  document.getElementById("confirmScreen").classList.add("hidden");
}

function submitOrder() {
  const name = document.getElementById("customerName").value;
  const items = [];
  let total = 0;

  for (let n in cart) {
    const item = findItem(n);
    items.push({ name: n, qty: cart[n], price: item.price });
    total += cart[n] * item.price;
  }

  fetch(webhookURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, items, total })
  }).then(() => {
    alert("Order submitted!");
    cart = {};
    goBack();
    renderMenu();
    updateFooter();
  });
}

renderMenu();
updateFooter();
</script>

</body>
</html>
