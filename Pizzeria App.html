<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Menu</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f5f5f5; }
    .container { padding:16px; }
    h2 { margin-top:24px; }
    .item { background:#fff; padding:12px; border-radius:12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
    .info { max-width:70%; }
    .name { font-weight:bold; }
    .price { color:#666; }
    .controls { display:flex; align-items:center; gap:8px; }
    button { border:none; border-radius:50%; width:36px; height:36px; font-size:18px; cursor:pointer; }
    .add { background:#2ec4b6; color:#fff; }
    .remove { background:#ff6b6b; color:#fff; }
    .qty { font-weight:bold; min-width:20px; text-align:center; }
    .footer { position:fixed; bottom:0; left:0; right:0; background:#2ec4b6; color:#000; padding:12px; display:flex; justify-content:space-between; align-items:center; }
    .hidden { display:none; }
    input { width:100%; padding:10px; margin-bottom:12px; border-radius:8px; border:1px solid #ccc; }
  </style>
</head>
<body>

<div class="container" id="menuScreen">
  <h2>Your Name</h2>
  <input type="text" id="customerName" placeholder="Enter your name" />
  <div id="menu"></div>
</div>

<div class="container hidden" id="confirmScreen">
  <h2>Confirm Order</h2>
  <div id="summary"></div>
  <button onclick="submitOrder()">Submit Order</button>
  <button onclick="goBack()">Back</button>
</div>

<div class="footer">
  <div id="count">0 items</div>
  <div id="total">£0.00</div>
  <button onclick="goConfirm()">Next</button>
</div>

<script>
const webhookURL = "YOUR_N8N_WEBHOOK_URL";

const data = {
  "ANTIPASTI": [
    { "name": "Soup of the Day", "price": 5.9 },
    { "name": "Marinated Olives", "price": 3.9 },
    { "name": "Tomato Bread", "price": 4.5 },
    { "name": "Garlic Bread / Optional Cheese", "price": 4.5 }
  ],
  "PIZZA": [
    { "name": "Margherita", "price": 10.9 },
    { "name": "Napoletana", "price": 12.8 },
    { "name": "Quattro Formaggi", "price": 14.2 }
  ],
  "PASTA": [
    { "name": "Spaghetti Bolognese", "price": 12.9 },
    { "name": "Penne Carbonara", "price": 12.9 },
    { "name": "Spaghetti Pesto", "price": 11.9 }
  ]
};

let cart = {};

function renderMenu() {
  const menuDiv = document.getElementById("menu");
  menuDiv.innerHTML = "";

  for (let category in data) {
    const h = document.createElement("h2");
    h.textContent = category;
    menuDiv.appendChild(h);

    data[category].forEach(item => {
      const div = document.createElement("div");
      div.className = "item";

      const info = document.createElement("div");
      info.className = "info";
      info.innerHTML = `<div class='name'>${item.name}</div><div class='price'>£${item.price.toFixed(2)}</div>`;

      const controls = document.createElement("div");
      controls.className = "controls";

      const minus = document.createElement("button");
      minus.textContent = "-";
      minus.className = "remove";
      minus.onclick = () => updateQty(item.name, -1);

      const qty = document.createElement("span");
      qty.className = "qty";
      qty.textContent = cart[item.name] || 0;

      const plus = document.createElement("button");
      plus.textContent = "+";
      plus.className = "add";
      plus.onclick = () => updateQty(item.name, 1);

      controls.append(minus, qty, plus);
      div.append(info, controls);
      menuDiv.appendChild(div);
    });
  }
}

function updateQty(name, change) {
  cart[name] = (cart[name] || 0) + change;
  if (cart[name] <= 0) delete cart[name];
  renderMenu();
  updateFooter();
}

function updateFooter() {
  let count = 0;
  let total = 0;

  for (let name in cart) {
    const item = findItem(name);
    count += cart[name];
    total += cart[name] * item.price;
  }

  document.getElementById("count").textContent = `${count} items`;
  document.getElementById("total").textContent = `£${total.toFixed(2)}`;
}

function findItem(name) {
  for (let cat in data) {
    const item = data[cat].find(i => i.name === name);
    if (item) return item;
  }
}

function goConfirm() {
  document.getElementById("menuScreen").classList.add("hidden");
  document.getElementById("confirmScreen").classList.remove("hidden");

  const summary = document.getElementById("summary");
  summary.innerHTML = "";

  for (let name in cart) {
    const item = findItem(name);
    const div = document.createElement("div");
    div.textContent = `${name} x${cart[name]} - £${(item.price * cart[name]).toFixed(2)}`;
    summary.appendChild(div);
  }
}

function goBack() {
  document.getElementById("menuScreen").classList.remove("hidden");
  document.getElementById("confirmScreen").classList.add("hidden");
}

function submitOrder() {
  const name = document.getElementById("customerName").value;
  const items = [];
  let total = 0;

  for (let n in cart) {
    const item = findItem(n);
    items.push({ name: n, qty: cart[n], price: item.price });
    total += cart[n] * item.price;
  }

  fetch(webhookURL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, items, total })
  }).then(() => {
    alert("Order submitted!");
    cart = {};
    goBack();
    renderMenu();
    updateFooter();
  });
}

renderMenu();
updateFooter();
</script>

</body>
</html>
